const STORE_KEY = "keel_data_v1";

/* storage adapter: localStorage on GitHub Pages, in-memory fallback */
const mem = {};
const store = {
  async get(k) {
    try { const v = localStorage.getItem(k); if (v !== null) return { key: k, value: v }; } catch (e) {}
    if (k in mem) return { key: k, value: mem[k] };
    throw new Error("not found");
  },
  async set(k, v) {
    try { localStorage.setItem(k, v); return { key: k, value: v }; } catch (e) { mem[k] = v; return { key: k, value: v }; }
  },
};

const shiftMonth = (m, delta) => {
  const [y, mo] = m.split("-").map(Number);
  const d = new Date(y, mo - 1 + delta, 1);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
};
const fmt = (n, dec = 0) =>
  (n < 0 ? "−$" : "$") + Math.abs(n).toLocaleString("en-CA", { minimumFractionDigits: dec, maximumFractionDigits: dec });

/* ── CSV helpers ───────────────────────────────────────────────────────── */
function toCSV(txns) {
  const esc = (s) => `"${String(s).replace(/"/g, '""')}"`;
  const rows = txns.map((t) => [t.date, esc(t.desc), esc(t.cat), t.type === "income" ? t.amount : -t.amount].join(","));
  return ["date,description,category,amount", ...rows].join("\n");
}
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter((l) => l.trim());
  if (!lines.length) return [];
  const out = [];
  const start = /date/i.test(lines[0]) ? 1 : 0;
  for (let i = start; i < lines.length; i++) {
    const cells = []; let cur = "", inQ = false;
    for (const ch of lines[i]) {
      if (ch === '"') inQ = !inQ;
      else if (ch === "," && !inQ) { cells.push(cur); cur = ""; }
      else cur += ch;
    }
    cells.push(cur);
    if (cells.length < 3) continue;
    const [date, desc, cat, amtRaw] = cells.length >= 4 ? cells : [cells[0], cells[1], "Uncategorized", cells[2]];
    const amt = parseFloat(String(amtRaw).replace(/[^0-9.-]/g, ""));
    if (!date || isNaN(amt)) continue;
    out.push({
      id: uid(), date: date.trim().slice(0, 10), desc: desc.trim() || "Imported",
      cat: (cat || "Uncategorized").trim(), amount: Math.abs(amt),
      type: amt >= 0 ? "income" : "expense",
    });
  }
  return out;
}

/* ── main app ──────────────────────────────────────────────────────────── */
function KeelApp() {
  const [data, setData] = useState(null);
  const [loadErr, setLoadErr] = useState(false);
  const [tab, setTab] = useState("dash");
  const [month, setMonth] = useState(thisMonth());
  const [query, setQuery] = useState("");
  const [saved, setSaved] = useState("idle");
  const saveTimer = useRef(null);
  const fileRef = useRef(null);
  const firstLoad = useRef(true);

  useEffect(() => {
    (async () => {
      try {
        const res = await store.get(STORE_KEY);
        if (res && res.value) setData(JSON.parse(res.value));
        else setData(emptyData());
      } catch {
        setData(emptyData());
      }
    })().catch(() => { setLoadErr(true); setData(emptyData()); });
  }, []);

  useEffect(() => {
    if (!data) return;
    if (firstLoad.current) { firstLoad.current = false; return; }
    setSaved("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try { await store.set(STORE_KEY, JSON.stringify(data)); setSaved("saved"); }
      catch { setSaved("idle"); }
      setTimeout(() => setSaved("idle"), 1600);
    }, 700);
    return () => clearTimeout(saveTimer.current);
  }, [data]);

  const dark = data && data.settings && data.settings.dark;
  const T = dark ? DARK : LIGHT;
  const up = (patch) => setData((d) => ({ ...d, ...patch }));

  const calc = useMemo(() => {
    if (!data) return null;
    const inMonth = data.txns.filter((t) => monthOf(t.date) === month);
    const income = inMonth.filter((t) => t.type === "income").reduce((s, t) => s + t.amount, 0);
    const spent = inMonth.filter((t) => t.type === "expense").reduce((s, t) => s + t.amount, 0);
    const byCat = {};
    inMonth.filter((t) => t.type === "expense").forEach((t) => { byCat[t.cat] = (byCat[t.cat] || 0) + t.amount; });

    const totalBudget = data.cats.reduce((s, c) => s + (+c.budget || 0), 0);
    const catRows = data.cats.map((c) => ({ ...c, spent: byCat[c.name] || 0 }));
    const overCats = catRows.filter((c) => c.budget > 0 && c.spent > c.budget).length;

    const flow = [];
    for (let i = 5; i >= 0; i--) {
      const m = shiftMonth(month, -i);
      const tx = data.txns.filter((t) => monthOf(t.date) === m);
      flow.push({
        m: m.slice(2),
        In: Math.round(tx.filter((t) => t.type === "income").reduce((s, t) => s + t.amount, 0)),
        Out: Math.round(tx.filter((t) => t.type === "expense").reduce((s, t) => s + t.amount, 0)),
      });
    }

    const groups = {};
    data.txns.filter((t) => t.type === "expense").forEach((t) => {
      const k = t.desc.toLowerCase().replace(/\s+/g, " ").trim();
      (groups[k] = groups[k] || []).push(t);
    });
    const recurring = Object.values(groups)
      .map((g) => {
        const months = new Set(g.map((t) => monthOf(t.date)));
        const avg = g.reduce((s, t) => s + t.amount, 0) / g.length;
        const varOk = g.every((t) => Math.abs(t.amount - avg) <= Math.max(2, avg * 0.12));
        return months.size >= 2 && varOk ? { desc: g[0].desc, cat: g[0].cat, avg, months: months.size } : null;
      })
      .filter(Boolean)
      .sort((a, b) => b.avg - a.avg);
    const recurringTotal = recurring.reduce((s, r) => s + r.avg, 0);

    const assets = data.assets.reduce((s, a) => s + (+a.value || 0), 0);
    const liabs = data.liabs.reduce((s, a) => s + (+a.value || 0), 0);
    const netWorth = assets - liabs;
    const debtTotal = data.debts.reduce((s, d) => s + (+d.balance || 0), 0);

    const savingsRate = income > 0 ? Math.max(0, (income - spent) / income) : 0;
    const sSave = Math.min(30, Math.round((savingsRate / 0.2) * 30));
    const adherence = data.cats.length ? 1 - overCats / data.cats.length : 0.5;
    const sBudget = Math.round(adherence * 25);
    const ef = data.goals.find((g) => /emergency/i.test(g.name));
    const efMonths = spent > 0 && ef ? ef.saved / spent : ef ? 3 : 0;
    const sEF = Math.min(25, Math.round((efMonths / 3) * 25));
    const dti = income > 0 ? debtTotal / (income * 12) : debtTotal > 0 ? 1 : 0;
    const sDebt = Math.round(Math.max(0, 1 - Math.min(1, dti / 0.35)) * 20);
    const score = sSave + sBudget + sEF + sDebt;

    return {
      inMonth, income, spent, byCat, catRows, totalBudget, flow, recurring, recurringTotal,
      assets, liabs, netWorth, debtTotal, savingsRate,
      score, parts: [
        { name: "Savings rate", pts: sSave, max: 30, note: `${Math.round(savingsRate * 100)}% of income kept (target 20%)` },
        { name: "Budget adherence", pts: sBudget, max: 25, note: overCats ? `${overCats} envelope${overCats > 1 ? "s" : ""} over budget` : "All envelopes on plan" },
        { name: "Emergency fund", pts: sEF, max: 25, note: `≈ ${efMonths.toFixed(1)} months of spending (target 3)` },
        { name: "Debt load", pts: sDebt, max: 20, note: debtTotal ? `${fmt(debtTotal)} outstanding` : "Debt-free" },
      ],
    };
  }, [data, month]);

  const payoff = useMemo(() => {
    if (!data || !data.debts.length) return null;
    const run = (mode) => {
      let debts = data.debts.map((d) => ({ ...d, balance: +d.balance || 0, rate: +d.rate || 0, min: +d.min || 0 }))
        .filter((d) => d.balance > 0);
      const order = [...debts].sort((a, b) => (mode === "snowball" ? a.balance - b.balance : b.rate - a.rate)).map((d) => d.id);
      let months = 0, interest = 0;
      const extra = +data.extraDebt || 0;
      while (debts.some((d) => d.balance > 0) && months < 600) {
        months++;
        let pool = extra;
        for (const d of debts) {
          if (d.balance <= 0) { pool += d.min; continue; }
          const int = (d.balance * d.rate) / 100 / 12;
          interest += int;
          d.balance += int - d.min;
        }
        for (const id of order) {
          const d = debts.find((x) => x.id === id);
          if (d && d.balance > 0 && pool > 0) { const pay = Math.min(pool, d.balance); d.balance -= pay; pool -= pay; }
        }
        debts.forEach((d) => { if (d.balance < 0.01) d.balance = 0; });
      }
      return { months, interest, order };
    };
    return { snowball: run("snowball"), avalanche: run("avalanche") };
  }, [data]);

  if (!data || !calc) {
    return (
      <div style={{ minHeight: "100vh", display: "grid", placeItems: "center", background: LIGHT.bg, color: LIGHT.sub, fontFamily: "'Spline Sans', sans-serif" }}>
        Opening your ledger…
      </div>
    );
  }

  const addTxn = (t) => up({ txns: [{ ...t, id: uid() }, ...data.txns] });
  const delTxn = (id) => up({ txns: data.txns.filter((t) => t.id !== id) });
  const setCat = (id, patch) => up({ cats: data.cats.map((c) => (c.id === id ? { ...c, ...patch } : c)) });

  const exportCSV = () => {
    const blob = new Blob([toCSV(data.txns)], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "keel-transactions.csv";
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const importCSV = (file) => {
    const r = new FileReader();
    r.onload = () => {
      const rows = parseCSV(String(r.result));
      if (rows.length) {
        const newCats = [...new Set(rows.map((t) => t.cat))]
          .filter((n) => n !== "Income" && !data.cats.some((c) => c.name === n))
          .map((n) => ({ id: uid(), name: n, group: "Imported", budget: 0 }));
        up({ txns: [...rows, ...data.txns], cats: [...data.cats, ...newCats] });
      }
    };
    r.readAsText(file);
  };

  const snapshotNW = () => {
    const hist = data.nwHistory.filter((h) => h.month !== thisMonth());
    up({ nwHistory: [...hist, { month: thisMonth(), net: calc.netWorth }].sort((a, b) => a.month.localeCompare(b.month)) });
  };

  const tabs = [
    ["dash", "Dashboard", Ic.Dash],
    ["budget", "Budget", Ic.Wallet],
    ["txns", "Transactions", Ic.Swap],
    ["goals", "Goals", Ic.Target],
    ["debt", "Debt", Ic.Down],
    ["nw", "Net worth", Ic.Scale],
  ];
  const scoreColor = calc.score >= 75 ? T.pos : calc.score >= 50 ? T.brass : T.neg;
  const empty = data.txns.length === 0 && data.cats.length === 0;

  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.ink, fontFamily: "'Spline Sans', system-ui, sans-serif" }}>
      <style>{`
        button:focus-visible, input:focus-visible, select:focus-visible { outline: 2px solid ${T.brass}; outline-offset: 2px; }
        input[type=number]::-webkit-inner-spin-button { opacity: .4 }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important } }
      `}</style>

      <header style={{ borderBottom: `1px solid ${T.line}`, background: T.card }}>
        <div style={{ maxWidth: 1060, margin: "0 auto", padding: "14px 18px", display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>
            <span style={{ fontFamily: "'Instrument Serif', serif", fontSize: 30, letterSpacing: "0.01em" }}>
              Keel<span style={{ color: T.brass }}>.</span>
            </span>
            <span style={{ fontSize: 12, color: T.sub }}>steady money, kept by you</span>
          </div>
          <div style={{ flex: 1 }} />
          <span style={{ fontSize: 12, color: T.sub, minWidth: 52, textAlign: "right" }}>
            {saved === "saving" ? "Saving…" : saved === "saved" ? "Saved ✓" : loadErr ? "Storage off" : ""}
          </span>
          {empty && (
            <Btn T={T} onClick={() => setData({ ...demoData(), settings: { dark } })} title="Load sample data to explore">
              <Ic.Spark size={15} /> Try demo data
            </Btn>
          )}
          {!empty && (
            <Btn T={T} onClick={() => { if (confirm("Erase everything and start fresh?")) setData({ ...emptyData(), settings: { dark } }); }} title="Start fresh">
              <Ic.Refresh size={15} /> Reset
            </Btn>
          )}
          <Btn T={T} onClick={() => up({ settings: { ...data.settings, dark: !dark } })} title="Toggle dark mode">
            {dark ? <Ic.Sun size={15} /> : <Ic.Moon size={15} />}
          </Btn>
        </div>
        <nav style={{ maxWidth: 1060, margin: "0 auto", padding: "0 10px", display: "flex", gap: 2, overflowX: "auto" }}>
          {tabs.map(([id, name, Icon]) => (
            <button key={id} onClick={() => setTab(id)} style={{
              display: "flex", alignItems: "center", gap: 7, padding: "10px 14px", fontSize: 13.5, fontWeight: 600,
              fontFamily: "inherit", cursor: "pointer", background: "none", color: tab === id ? T.prim : T.sub,
              border: "none", borderBottom: `2.5px solid ${tab === id ? T.brass : "transparent"}`, whiteSpace: "nowrap",
            }}>
              <Icon size={16} /> {name}
            </button>
          ))}
        </nav>
      </header>

      <main style={{ maxWidth: 1060, margin: "0 auto", padding: "20px 18px 60px" }}>

        {["dash", "budget", "txns"].includes(tab) && (
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18 }}>
            <Btn T={T} onClick={() => setMonth(shiftMonth(month, -1))} title="Previous month"><Ic.Left size={16} /></Btn>
            <div style={{ fontFamily: "'Instrument Serif', serif", fontSize: 24, minWidth: 200, textAlign: "center" }}>{monthLabel(month)}</div>
            <Btn T={T} onClick={() => setMonth(shiftMonth(month, 1))} title="Next month"><Ic.Right size={16} /></Btn>
            {month !== thisMonth() && <Btn T={T} onClick={() => setMonth(thisMonth())}>Today</Btn>}
          </div>
        )}

        {tab === "dash" && (
          <div style={{ display: "grid", gap: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))", gap: 14 }}>
              <Card T={T}><Label T={T}>Income</Label><Num T={T} color={T.pos}>{fmt(calc.income)}</Num></Card>
              <Card T={T}><Label T={T}>Spent</Label><Num T={T} color={T.neg}>{fmt(calc.spent)}</Num></Card>
              <Card T={T}><Label T={T}>Kept (savings rate)</Label>
                <Num T={T}>{fmt(calc.income - calc.spent)} <span style={{ fontSize: 14, color: T.sub }}>· {calc.income ? Math.round(calc.savingsRate * 100) : 0}%</span></Num>
              </Card>
              <Card T={T}><Label T={T}>Net worth</Label><Num T={T} color={T.prim}>{fmt(calc.netWorth)}</Num></Card>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 14 }}>
              <Card T={T}>
                <Label T={T}>Financial health score</Label>
                <div style={{ display: "flex", alignItems: "center", gap: 18, marginTop: 10 }}>
                  <div style={{
                    width: 92, height: 92, borderRadius: "50%", display: "grid", placeItems: "center", flexShrink: 0,
                    background: `conic-gradient(${scoreColor} ${calc.score * 3.6}deg, ${T.line} 0deg)`,
                  }}>
                    <div style={{ width: 70, height: 70, borderRadius: "50%", background: T.card, display: "grid", placeItems: "center" }}>
                      <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 24, fontWeight: 600, color: scoreColor }}>{calc.score}</span>
                    </div>
                  </div>
                  <div style={{ flex: 1, display: "grid", gap: 8 }}>
                    {calc.parts.map((p) => (
                      <div key={p.name}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 3 }}>
                          <span style={{ fontWeight: 600 }}>{p.name}</span>
                          <span style={{ color: T.sub, fontFamily: "'IBM Plex Mono', monospace" }}>{p.pts}/{p.max}</span>
                        </div>
                        <Bar_ T={T} pct={(p.pts / p.max) * 100} color={T.prim} />
                        <div style={{ fontSize: 11, color: T.sub, marginTop: 2 }}>{p.note}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ fontSize: 11, color: T.sub, marginTop: 10 }}>
                  No black box: the rubric is savings rate /30, budget adherence /25, emergency fund /25, debt load /20.
                </div>
              </Card>

              <Card T={T}>
                <Label T={T}>Where {monthLabel(month).split(" ")[0]} went</Label>
                {Object.keys(calc.byCat).length ? (
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
                    <ResponsiveContainer width="55%" height={190}>
                      <PieChart>
                        <Pie data={Object.entries(calc.byCat).map(([name, value]) => ({ name, value: Math.round(value) }))}
                          dataKey="value" innerRadius={45} outerRadius={78} paddingAngle={2} stroke="none">
                          {Object.keys(calc.byCat).map((_, i) => <Cell key={i} fill={T.chart[i % T.chart.length]} />)}
                        </Pie>
                        <Tooltip formatter={(v) => fmt(v)} contentStyle={{ background: T.card, border: `1px solid ${T.line}`, borderRadius: 10, fontSize: 12 }} />
                      </PieChart>
                    </ResponsiveContainer>
                    <div style={{ fontSize: 12, display: "grid", gap: 4, flex: 1 }}>
                      {Object.entries(calc.byCat).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([name, v], i) => (
                        <div key={name} style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ width: 9, height: 9, borderRadius: 3, background: T.chart[i % T.chart.length], flexShrink: 0 }} />
                          <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{name}</span>
                          <span style={{ fontFamily: "'IBM Plex Mono', monospace", color: T.sub }}>{fmt(v)}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : <div style={{ padding: "34px 0", color: T.sub, fontSize: 13 }}>No spending recorded this month yet. Add a transaction to see the picture.</div>}
              </Card>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 14 }}>
              <Card T={T}>
                <Label T={T}>Cash flow — last 6 months</Label>
                <ResponsiveContainer width="100%" height={200}>
                  <BarChart data={calc.flow} margin={{ top: 16, right: 4, left: -14, bottom: 0 }}>
                    <CartesianGrid stroke={T.line} vertical={false} />
                    <XAxis dataKey="m" tick={{ fill: T.sub, fontSize: 11 }} axisLine={false} tickLine={false} />
                    <YAxis tick={{ fill: T.sub, fontSize: 11 }} axisLine={false} tickLine={false} />
                    <Tooltip formatter={(v) => fmt(v)} contentStyle={{ background: T.card, border: `1px solid ${T.line}`, borderRadius: 10, fontSize: 12 }} />
                    <Legend wrapperStyle={{ fontSize: 12 }} />
                    <Bar dataKey="In" fill={T.prim} radius={[4, 4, 0, 0]} />
                    <Bar dataKey="Out" fill={T.brass} radius={[4, 4, 0, 0]} />
                  </BarChart>
                </ResponsiveContainer>
              </Card>

              <Card T={T}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                  <Label T={T}>Recurring radar</Label>
                  {calc.recurring.length > 0 && (
                    <span style={{ fontSize: 12, color: T.sub }}>
                      ≈ <b style={{ color: T.ink, fontFamily: "'IBM Plex Mono', monospace" }}>{fmt(calc.recurringTotal)}</b>/mo detected
                    </span>
                  )}
                </div>
                {calc.recurring.length ? (
                  <div style={{ marginTop: 10, display: "grid", gap: 8 }}>
                    {calc.recurring.slice(0, 7).map((r) => (
                      <div key={r.desc} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13 }}>
                        <span style={{ color: T.brass, flexShrink: 0, display: "inline-flex" }}><Ic.Repeat size={14} /></span>
                        <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.desc}</span>
                        <span style={{ fontSize: 11, color: T.sub }}>{r.months} mo</span>
                        <span style={{ fontFamily: "'IBM Plex Mono', monospace" }}>{fmt(r.avg, 2)}</span>
                      </div>
                    ))}
                    <div style={{ fontSize: 11, color: T.sub }}>Detected from repeated charges in your ledger — worth a cancel-or-keep pass every few months.</div>
                  </div>
                ) : <div style={{ padding: "30px 0", color: T.sub, fontSize: 13 }}>Once the same charge shows up in two different months, it appears here automatically.</div>}
              </Card>
            </div>
          </div>
        )}

        {tab === "budget" && (
          <div style={{ display: "grid", gap: 14 }}>
            <Card T={T} style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
              <div><Label T={T}>Planned</Label><Num T={T}>{fmt(calc.totalBudget)}</Num></div>
              <div><Label T={T}>Spent</Label><Num T={T} color={T.neg}>{fmt(calc.spent)}</Num></div>
              <div><Label T={T}>Left to spend</Label><Num T={T} color={calc.totalBudget - calc.spent >= 0 ? T.pos : T.neg}>{fmt(calc.totalBudget - calc.spent)}</Num></div>
              <div><Label T={T}>Income this month</Label><Num T={T}>{fmt(calc.income)}</Num></div>
            </Card>

            {["Needs", "Wants", "Future", "Imported"].filter((g) => calc.catRows.some((c) => c.group === g)).map((group) => (
              <Card T={T} key={group}>
                <Label T={T}>{group}</Label>
                <div style={{ display: "grid", gap: 14, marginTop: 12 }}>
                  {calc.catRows.filter((c) => c.group === group).map((c) => {
                    const pct = c.budget > 0 ? (c.spent / c.budget) * 100 : 0;
                    const over = c.budget > 0 && c.spent > c.budget;
                    return (
                      <div key={c.id}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 5, flexWrap: "wrap" }}>
                          <span style={{ fontWeight: 600, fontSize: 14, flex: 1 }}>{c.name}</span>
                          <span style={{ fontSize: 12.5, fontFamily: "'IBM Plex Mono', monospace", color: over ? T.neg : T.sub }}>
                            {fmt(c.spent)} of
                          </span>
                          <Input T={T} type="number" value={c.budget} title={`Monthly budget for ${c.name}`}
                            onChange={(e) => setCat(c.id, { budget: +e.target.value || 0 })} style={{ width: 88, textAlign: "right", fontFamily: "'IBM Plex Mono', monospace" }} />
                          <button onClick={() => { if (confirm(`Remove envelope "${c.name}"?`)) up({ cats: data.cats.filter((x) => x.id !== c.id) }); }}
                            style={{ background: "none", border: "none", cursor: "pointer", color: T.sub }} title="Remove envelope"><Ic.Trash size={15} /></button>
                        </div>
                        <Bar_ T={T} pct={pct} color={over ? T.neg : pct > 85 ? T.brass : T.prim} />
                        {over && <div style={{ fontSize: 11, color: T.neg, marginTop: 3 }}>{fmt(c.spent - c.budget)} over — move money from another envelope or adjust the plan.</div>}
                      </div>
                    );
                  })}
                </div>
              </Card>
            ))}

            <Card T={T}>
              <Label T={T}>New envelope</Label>
              <NewCat T={T} onAdd={(c) => up({ cats: [...data.cats, { ...c, id: uid() }] })} />
            </Card>
          </div>
        )}

        {tab === "txns" && (
          <div style={{ display: "grid", gap: 14 }}>
            <Card T={T}>
              <Label T={T}>Add transaction</Label>
              <NewTxn T={T} cats={data.cats} onAdd={addTxn} />
            </Card>

            <Card T={T}>
              <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginBottom: 12 }}>
                <div style={{ position: "relative", flex: 1, minWidth: 180 }}>
                  <span style={{ position: "absolute", left: 10, top: 11, color: T.sub, display: "inline-flex" }}><Ic.Search size={14} /></span>
                  <Input T={T} placeholder="Search description or category…" value={query} onChange={(e) => setQuery(e.target.value)} style={{ width: "100%", paddingLeft: 30 }} />
                  {query && <button onClick={() => setQuery("")} style={{ position: "absolute", right: 8, top: 9, background: "none", border: "none", cursor: "pointer", color: T.sub }}><Ic.X size={14} /></button>}
                </div>
                <Btn T={T} onClick={exportCSV} title="Download all transactions as CSV"><Ic.Download size={15} /> Export CSV</Btn>
                <Btn T={T} onClick={() => fileRef.current && fileRef.current.click()} title="Import a CSV: date, description, category, amount (negative = expense)"><Ic.Upload size={15} /> Import CSV</Btn>
                <input ref={fileRef} type="file" accept=".csv,text/csv" style={{ display: "none" }}
                  onChange={(e) => { if (e.target.files && e.target.files[0]) importCSV(e.target.files[0]); e.target.value = ""; }} />
              </div>

              {(() => {
                const q = query.toLowerCase();
                const rows = data.txns
                  .filter((t) => (q ? t.desc.toLowerCase().includes(q) || t.cat.toLowerCase().includes(q) : monthOf(t.date) === month))
                  .sort((a, b) => b.date.localeCompare(a.date))
                  .slice(0, 250);
                if (!rows.length) return <div style={{ padding: "26px 0", color: T.sub, fontSize: 13 }}>{query ? "Nothing matches that search." : "No transactions this month. Add one above, import a CSV, or load the demo data."}</div>;
                return (
                  <div style={{ display: "grid", gap: 2 }}>
                    {query && <div style={{ fontSize: 11, color: T.sub, marginBottom: 6 }}>Searching all months · {rows.length} result{rows.length !== 1 ? "s" : ""}</div>}
                    {rows.map((t) => (
                      <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 6px", borderBottom: `1px solid ${T.line}`, fontSize: 13.5 }}>
                        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, color: T.sub, width: 78, flexShrink: 0 }}>{t.date}</span>
                        <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.desc}</span>
                        <span style={{ fontSize: 11.5, color: T.sub, background: T.bg, border: `1px solid ${T.line}`, borderRadius: 99, padding: "2px 9px", whiteSpace: "nowrap" }}>{t.cat}</span>
                        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, width: 96, textAlign: "right", color: t.type === "income" ? T.pos : T.ink }}>
                          {t.type === "income" ? "+" : "−"}{fmt(t.amount, 2)}
                        </span>
                        <button onClick={() => delTxn(t.id)} style={{ background: "none", border: "none", cursor: "pointer", color: T.sub }} title="Delete"><Ic.Trash size={14} /></button>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </Card>
          </div>
        )}

        {tab === "goals" && (
          <div style={{ display: "grid", gap: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 14 }}>
              {data.goals.map((g) => {
                const pct = g.target > 0 ? (g.saved / g.target) * 100 : 0;
                return (
                  <Card T={T} key={g.id}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start" }}>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 16 }}>{g.name}</div>
                        {g.note && <div style={{ fontSize: 12, color: T.sub }}>{g.note}</div>}
                      </div>
                      <button onClick={() => { if (confirm(`Remove goal "${g.name}"?`)) up({ goals: data.goals.filter((x) => x.id !== g.id) }); }}
                        style={{ background: "none", border: "none", cursor: "pointer", color: T.sub }} title="Remove goal"><Ic.Trash size={15} /></button>
                    </div>
                    <Num T={T} size={22}>{fmt(g.saved)} <span style={{ fontSize: 13, color: T.sub, fontFamily: "'Spline Sans'" }}>of {fmt(g.target)}</span></Num>
                    <div style={{ margin: "10px 0 6px" }}><Bar_ T={T} pct={pct} color={pct >= 100 ? T.pos : T.brass} /></div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 12, color: pct >= 100 ? T.pos : T.sub, fontWeight: 600 }}>
                        {pct >= 100 ? "Funded — nicely done" : `${Math.round(pct)}% · ${fmt(g.target - g.saved)} to go`}
                      </span>
                      <AddMoney T={T} onAdd={(amt) => up({ goals: data.goals.map((x) => x.id === g.id ? { ...x, saved: Math.max(0, x.saved + amt) } : x) })} />
                    </div>
                  </Card>
                );
              })}
            </div>
            <Card T={T}>
              <Label T={T}>New goal / sinking fund</Label>
              <NewGoal T={T} onAdd={(g) => up({ goals: [...data.goals, { ...g, id: uid() }] })} />
              <div style={{ fontSize: 11, color: T.sub, marginTop: 8 }}>Vacation, car, home down payment, emergency fund — one card per fund. Name one "Emergency fund" and it feeds your health score.</div>
            </Card>
          </div>
        )}

        {tab === "debt" && (
          <div style={{ display: "grid", gap: 14 }}>
            {data.debts.length > 0 && payoff && (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(250px, 1fr))", gap: 14 }}>
                <Card T={T}>
                  <Label T={T}>Total owed</Label>
                  <Num T={T} color={T.neg}>{fmt(calc.debtTotal)}</Num>
                  <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 8, fontSize: 13 }}>
                    <span style={{ color: T.sub }}>Extra toward debt each month:</span>
                    <Input T={T} type="number" value={data.extraDebt} onChange={(e) => up({ extraDebt: +e.target.value || 0 })}
                      style={{ width: 90, textAlign: "right", fontFamily: "'IBM Plex Mono', monospace" }} />
                  </div>
                </Card>
                <Card T={T}>
                  <Label T={T}>Snowball — smallest balance first</Label>
                  <Num T={T} size={20}>{payoff.snowball.months >= 600 ? "600+ mo" : `${payoff.snowball.months} months`}</Num>
                  <div style={{ fontSize: 12, color: T.sub }}>≈ {fmt(payoff.snowball.interest)} interest · quick wins keep momentum</div>
                </Card>
                <Card T={T}>
                  <Label T={T}>Avalanche — highest rate first</Label>
                  <Num T={T} size={20}>{payoff.avalanche.months >= 600 ? "600+ mo" : `${payoff.avalanche.months} months`}</Num>
                  <div style={{ fontSize: 12, color: T.sub }}>
                    ≈ {fmt(payoff.avalanche.interest)} interest
                    {payoff.snowball.interest - payoff.avalanche.interest > 1 && <> · saves {fmt(payoff.snowball.interest - payoff.avalanche.interest)} vs snowball</>}
                  </div>
                </Card>
              </div>
            )}
            <Card T={T}>
              <Label T={T}>Debts</Label>
              {data.debts.length ? (
                <div style={{ display: "grid", gap: 10, marginTop: 10 }}>
                  {data.debts.map((d) => (
                    <div key={d.id} style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", padding: "8px 0", borderBottom: `1px solid ${T.line}` }}>
                      <span style={{ fontWeight: 600, flex: 1, minWidth: 120 }}>{d.name}</span>
                      <label style={{ fontSize: 11, color: T.sub }}>Balance <Input T={T} type="number" value={d.balance} onChange={(e) => up({ debts: data.debts.map((x) => x.id === d.id ? { ...x, balance: +e.target.value || 0 } : x) })} style={{ width: 96, marginLeft: 4, textAlign: "right", fontFamily: "'IBM Plex Mono', monospace" }} /></label>
                      <label style={{ fontSize: 11, color: T.sub }}>Rate % <Input T={T} type="number" step="0.01" value={d.rate} onChange={(e) => up({ debts: data.debts.map((x) => x.id === d.id ? { ...x, rate: +e.target.value || 0 } : x) })} style={{ width: 70, marginLeft: 4, textAlign: "right", fontFamily: "'IBM Plex Mono', monospace" }} /></label>
                      <label style={{ fontSize: 11, color: T.sub }}>Min/mo <Input T={T} type="number" value={d.min} onChange={(e) => up({ debts: data.debts.map((x) => x.id === d.id ? { ...x, min: +e.target.value || 0 } : x) })} style={{ width: 80, marginLeft: 4, textAlign: "right", fontFamily: "'IBM Plex Mono', monospace" }} /></label>
                      <button onClick={() => up({ debts: data.debts.filter((x) => x.id !== d.id) })} style={{ background: "none", border: "none", cursor: "pointer", color: T.sub }} title="Remove"><Ic.Trash size={15} /></button>
                    </div>
                  ))}
                </div>
              ) : <div style={{ padding: "22px 0", color: T.sub, fontSize: 13 }}>Debt-free, or just not tracked yet. Add balances below to compare payoff plans.</div>}
              <NewDebt T={T} onAdd={(d) => up({ debts: [...data.debts, { ...d, id: uid() }] })} />
              <div style={{ fontSize: 11, color: T.sub, marginTop: 10 }}>Projections are estimates for planning, not financial advice — actual payoff depends on your lender's terms.</div>
            </Card>
          </div>
        )}

        {tab === "nw" && (
          <div style={{ display: "grid", gap: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 14 }}>
              <Card T={T}><Label T={T}>Assets</Label><Num T={T} color={T.pos}>{fmt(calc.assets)}</Num></Card>
              <Card T={T}><Label T={T}>Liabilities</Label><Num T={T} color={T.neg}>{fmt(calc.liabs)}</Num></Card>
              <Card T={T}>
                <Label T={T}>Net worth</Label><Num T={T} color={T.prim}>{fmt(calc.netWorth)}</Num>
                <Btn T={T} kind="prim" onClick={snapshotNW} style={{ marginTop: 8 }} title="Record this month's net worth on the chart">
                  <Ic.Plus size={14} /> Snapshot {monthLabel(thisMonth()).split(" ")[0]}
                </Btn>
              </Card>
            </div>

            {data.nwHistory.length > 1 && (
              <Card T={T}>
                <Label T={T}>Net worth over time</Label>
                <ResponsiveContainer width="100%" height={220}>
                  <LineChart data={data.nwHistory} margin={{ top: 16, right: 8, left: -6, bottom: 0 }}>
                    <CartesianGrid stroke={T.line} vertical={false} />
                    <XAxis dataKey="month" tick={{ fill: T.sub, fontSize: 11 }} axisLine={false} tickLine={false} />
                    <YAxis tick={{ fill: T.sub, fontSize: 11 }} axisLine={false} tickLine={false} width={64} tickFormatter={(v) => `$${(v / 1000).toFixed(0)}k`} />
                    <Tooltip formatter={(v) => fmt(v)} contentStyle={{ background: T.card, border: `1px solid ${T.line}`, borderRadius: 10, fontSize: 12 }} />
                    <Line type="monotone" dataKey="net" name="Net worth" stroke={T.prim} strokeWidth={2.5} dot={{ r: 3, fill: T.brass, strokeWidth: 0 }} />
                  </LineChart>
                </ResponsiveContainer>
              </Card>
            )}

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 14 }}>
              <BalanceList T={T} title="Assets" items={data.assets} pos
                onChange={(items) => up({ assets: items })}
                hint="Chequing, savings, TFSA/RRSP, investments, home value…" />
              <BalanceList T={T} title="Liabilities" items={data.liabs}
                onChange={(items) => up({ liabs: items })}
                hint="Credit cards, loans, mortgage balance…" />
            </div>
          </div>
        )}
      </main>

      <footer style={{ borderTop: `1px solid ${T.line}`, padding: "16px 18px", textAlign: "center", fontSize: 11.5, color: T.sub }}>
        Keel stores everything in this browser on this device — nothing is sent to any server. Export CSV for backups. Free forever.
      </footer>
    </div>
  );
}

/* ── small form components ─────────────────────────────────────────────── */
function NewTxn({ T, cats, onAdd }) {
  const [f, setF] = useState({ date: todayISO(), desc: "", cat: "", amount: "", type: "expense" });
  const submit = () => {
    const amt = parseFloat(f.amount);
    if (!f.desc.trim() || isNaN(amt) || amt <= 0) return;
    onAdd({ date: f.date || todayISO(), desc: f.desc.trim(), cat: f.type === "income" ? "Income" : (f.cat || "Uncategorized"), amount: amt, type: f.type });
    setF({ ...f, desc: "", amount: "" });
  };
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 10, alignItems: "center" }}>
      <Select T={T} value={f.type} onChange={(e) => setF({ ...f, type: e.target.value })}>
        <option value="expense">Expense</option><option value="income">Income</option>
      </Select>
      <Input T={T} type="date" value={f.date} onChange={(e) => setF({ ...f, date: e.target.value })} />
      <Input T={T} placeholder="Description" value={f.desc} onChange={(e) => setF({ ...f, desc: e.target.value })}
        onKeyDown={(e) => e.key === "Enter" && submit()} style={{ flex: 1, minWidth: 150 }} />
      {f.type === "expense" && (
        <Select T={T} value={f.cat} onChange={(e) => setF({ ...f, cat: e.target.value })}>
          <option value="">Envelope…</option>
          {cats.map((c) => <option key={c.id} value={c.name}>{c.name}</option>)}
          <option value="Uncategorized">Uncategorized</option>
        </Select>
      )}
      <Input T={T} type="number" placeholder="0.00" value={f.amount} onChange={(e) => setF({ ...f, amount: e.target.value })}
        onKeyDown={(e) => e.key === "Enter" && submit()} style={{ width: 100, textAlign: "right", fontFamily: "'IBM Plex Mono', monospace" }} />
      <Btn T={T} kind="prim" onClick={submit}><Ic.Plus size={15} /> Add</Btn>
    </div>
  );
}

function NewCat({ T, onAdd }) {
  const [f, setF] = useState({ name: "", group: "Needs", budget: "" });
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 10 }}>
      <Input T={T} placeholder="Envelope name (e.g. Pets)" value={f.name} onChange={(e) => setF({ ...f, name: e.target.value })} style={{ flex: 1, minWidth: 160 }} />
      <Select T={T} value={f.group} onChange={(e) => setF({ ...f, group: e.target.value })}>
        <option>Needs</option><option>Wants</option><option>Future</option>
      </Select>
      <Input T={T} type="number" placeholder="Monthly $" value={f.budget} onChange={(e) => setF({ ...f, budget: e.target.value })} style={{ width: 110, textAlign: "right" }} />
      <Btn T={T} kind="prim" onClick={() => { if (f.name.trim()) { onAdd({ name: f.name.trim(), group: f.group, budget: +f.budget || 0 }); setF({ name: "", group: f.group, budget: "" }); } }}>
        <Ic.Plus size={15} /> Add envelope
      </Btn>
    </div>
  );
}

function NewGoal({ T, onAdd }) {
  const [f, setF] = useState({ name: "", target: "", saved: "", note: "" });
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 10 }}>
      <Input T={T} placeholder="Goal name" value={f.name} onChange={(e) => setF({ ...f, name: e.target.value })} style={{ flex: 1, minWidth: 140 }} />
      <Input T={T} type="number" placeholder="Target $" value={f.target} onChange={(e) => setF({ ...f, target: e.target.value })} style={{ width: 110 }} />
      <Input T={T} type="number" placeholder="Saved so far $" value={f.saved} onChange={(e) => setF({ ...f, saved: e.target.value })} style={{ width: 130 }} />
      <Input T={T} placeholder="Note (optional)" value={f.note} onChange={(e) => setF({ ...f, note: e.target.value })} style={{ flex: 1, minWidth: 120 }} />
      <Btn T={T} kind="prim" onClick={() => { if (f.name.trim() && +f.target > 0) { onAdd({ name: f.name.trim(), target: +f.target, saved: +f.saved || 0, note: f.note.trim() }); setF({ name: "", target: "", saved: "", note: "" }); } }}>
        <Ic.Plus size={15} /> Add goal
      </Btn>
    </div>
  );
}

function AddMoney({ T, onAdd }) {
  const [v, setV] = useState("");
  return (
    <span style={{ display: "inline-flex", gap: 6 }}>
      <Input T={T} type="number" placeholder="+$" value={v} onChange={(e) => setV(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter" && +v) { onAdd(+v); setV(""); } }} style={{ width: 76, textAlign: "right" }} />
      <Btn T={T} onClick={() => { if (+v) { onAdd(+v); setV(""); } }} title="Add to this fund"><Ic.Plus size={14} /></Btn>
    </span>
  );
}

function NewDebt({ T, onAdd }) {
  const [f, setF] = useState({ name: "", balance: "", rate: "", min: "" });
  return (
    <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 14 }}>
      <Input T={T} placeholder="Debt name" value={f.name} onChange={(e) => setF({ ...f, name: e.target.value })} style={{ flex: 1, minWidth: 130 }} />
      <Input T={T} type="number" placeholder="Balance $" value={f.balance} onChange={(e) => setF({ ...f, balance: e.target.value })} style={{ width: 110 }} />
      <Input T={T} type="number" step="0.01" placeholder="Rate %" value={f.rate} onChange={(e) => setF({ ...f, rate: e.target.value })} style={{ width: 90 }} />
      <Input T={T} type="number" placeholder="Min pay $" value={f.min} onChange={(e) => setF({ ...f, min: e.target.value })} style={{ width: 100 }} />
      <Btn T={T} kind="prim" onClick={() => { if (f.name.trim() && +f.balance > 0) { onAdd({ name: f.name.trim(), balance: +f.balance, rate: +f.rate || 0, min: +f.min || 0 }); setF({ name: "", balance: "", rate: "", min: "" }); } }}>
        <Ic.Plus size={15} /> Add debt
      </Btn>
    </div>
  );
}

function BalanceList({ T, title, items, onChange, hint, pos }) {
  const [f, setF] = useState({ name: "", value: "" });
  return (
    <Card T={T}>
      <Label T={T}>{title}</Label>
      <div style={{ display: "grid", gap: 6, marginTop: 10 }}>
        {items.map((it) => (
          <div key={it.id} style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <span style={{ flex: 1, fontSize: 13.5 }}>{it.name}</span>
            <Input T={T} type="number" value={it.value}
              onChange={(e) => onChange(items.map((x) => x.id === it.id ? { ...x, value: +e.target.value || 0 } : x))}
              style={{ width: 110, textAlign: "right", fontFamily: "'IBM Plex Mono', monospace", color: pos ? T.pos : T.neg }} />
            <button onClick={() => onChange(items.filter((x) => x.id !== it.id))} style={{ background: "none", border: "none", cursor: "pointer", color: T.sub }} title="Remove"><Ic.Trash size={14} /></button>
          </div>
        ))}
        {!items.length && <div style={{ fontSize: 12, color: T.sub, padding: "8px 0" }}>{hint}</div>}
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
        <Input T={T} placeholder="Account name" value={f.name} onChange={(e) => setF({ ...f, name: e.target.value })} style={{ flex: 1 }} />
        <Input T={T} type="number" placeholder="$" value={f.value} onChange={(e) => setF({ ...f, value: e.target.value })} style={{ width: 100 }} />
        <Btn T={T} onClick={() => { if (f.name.trim()) { onChange([...items, { id: uid(), name: f.name.trim(), value: +f.value || 0 }]); setF({ name: "", value: "" }); } }}><Ic.Plus size={14} /></Btn>
      </div>
    </Card>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<KeelApp />);
</script>
</body>
</html>
